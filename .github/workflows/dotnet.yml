# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Auto-Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
        
    - name: Auto-Discover and Build All Solutions
      run: |
        find . -name "*.sln" | while read sln_file; do
          echo "========================================"
          echo "Found solution: $sln_file"
          echo "========================================"
          
          echo "Restoring..."
          dotnet restore "$sln_file"
          
          echo "Building..."
          dotnet build "$sln_file" --no-restore
          
          echo "Testing..."
          dotnet test "$sln_file" --no-build --verbosity normal
        done
      shell: bash
